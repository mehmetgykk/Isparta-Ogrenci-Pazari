<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş & Kayıt Sistemi</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

            button:hover {
                background: #764ba2;
            }

        .toggle {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            cursor: pointer;
            color: #667eea;
        }
    </style>
</head>
<body>

    <div class="container" id="authBox">
        <h2 id="title">Giriş Yap</h2>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="password" id="password" placeholder="Şifre">
        <input type="password" id="confirmPassword" placeholder="Şifre Tekrar" style="display: none;">
        <button onclick="handleAuth()" id="mainBtn">Giriş</button>
        <div class="toggle" onclick="toggleMode()" id="toggleText">Hesabın yok mu? Kayıt Ol</div>
    </div>

    <script>
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;

            // Mevcut kodların (title, mainBtn vs. değiştirenler) burada kalsın...
            document.getElementById('title').innerText = isLogin ? "Giriş Yap" : "Kayıt Ol";
            document.getElementById('mainBtn').innerText = isLogin ? "Giriş" : "Kayıt Ol";
            document.getElementById('toggleText').innerText = isLogin ? "Hesabın yok mu? Kayıt Ol" : "Zaten hesabın var mı? Giriş Yap";

            // KUTUYU AÇIP KAPATAN SİHİRLİ SATIR:
            document.getElementById('confirmPassword').style.display = isLogin ? "none" : "block";
        }

        async function handleAuth() {
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const confirmPasswordInput = document.getElementById('confirmPassword').value;

            // 1. ŞİFRE ONAY KONTROLÜ
            // Eğer kayıt olma modundaysak ve şifreler tutmuyorsa durdur!
            if (!isLogin) {
                if (passwordInput !== confirmPasswordInput) {
                    alert("Hata: Girdiğin şifreler birbiriyle uyuşmuyor!");
                    return; // Fonksiyon burada biter, aşağıya inip API'ye istek ATMAZ.
                }
            }

            const user = {
                username: usernameInput,
                password: passwordInput
            };

            const endpoint = isLogin ? 'login' : 'register';

            try {
                const response = await fetch(`https://localhost:7186/api/auth/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(user)
                });

                const result = await response.text();

                if (response.ok) {
                    if (isLogin) {
                        // GİRİŞ BAŞARILIYSA: İsmi kaydet ve yönlendir
                        localStorage.setItem('username', user.username);
                        window.location.href = 'dashboard.html';
                    } else {
                        alert("Kayıt başarılı! Şimdi giriş yapabilirsin.");
                        document.getElementById('password').value = "";        // Ana şifre kutusunu boşalt
                        document.getElementById('confirmPassword').value = ""; // Onay kutusunu boşalt
                        toggleMode(); // Otomatik giriş ekranına atar
                    }
                } else {
                    alert(result); // Hatalı şifre vs. mesajını gösterir
                }
            } catch (error) {
                alert("Bağlantı hatası!");
            }
        }
        // Sayfadaki tuş basışlarını dinle
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleAuth(); // Enter'a basılınca giriş fonksiyonunu çalıştır
            }
        });
    </script>

</body>
</html>
